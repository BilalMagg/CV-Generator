<section class="pricing-section" id="pricing">
  <div class="pricing-inner">
    <div class="section-head">
      <span class="section-eyebrow-pill">Pricing</span>
      <h2 class="section-display-title">Simple, honest pricing</h2>
    </div>

    <div class="pricing-grid">
      @for (plan of plans; track plan.name) {
        <div class="pricing-card" [class.pricing-card--featured]="plan.featured">
          @if (plan.featured) {
            <div class="pricing-badge">Most popular</div>
          }
          <div class="pricing-name">{{ plan.name }}</div>
          <div class="pricing-price">
            <span class="pricing-amount">{{ plan.price }}</span>
            <span class="pricing-period">{{ plan.period }}</span>
          </div>
          <p class="pricing-desc">{{ plan.desc }}</p>

          <a [routerLink]="plan.ctaLink" class="pricing-cta" [class.pricing-cta--dark]="plan.featured">
            {{ plan.cta }}
          </a>

          <ul class="pricing-features">
            @for (f of plan.features; track f) {
              <li class="pricing-feature">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                  <path d="M12 4L6 11L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                {{ f }}
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
