<section class="logos-section">
  <div class="logos-inner">
    <div class="logos-label">Job seekers placed at</div>
    <div class="logos-track">
      @for (company of companies; track company.name) {
        <div class="logo-item">
          <div class="logo-mark" [style.background]="company.color">{{ company.mark }}</div>
          <span>{{ company.name }}</span>
        </div>
      }
    </div>
  </div>
</section>
