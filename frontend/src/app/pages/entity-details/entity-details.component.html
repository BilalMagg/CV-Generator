<div class="detail-container" *ngIf="item">
  <div class="detail-header">
    <button class="back-link" (click)="goBack()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="icon">
        <path d="M19 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 19L5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to {{ entity | titlecase }}
    </button>
    
    <div class="header-main">
      <h2>{{ entity | titlecase }} Details</h2>
      <div class="actions">
        <button class="btn btn-secondary" (click)="goToEdit()">
          Edit
        </button>
        <button class="btn btn-danger" (click)="deleteItem()">
          Delete
        </button>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="info-grid">
      <div *ngFor="let field of fields" class="info-item" [class.full-width]="field.type === 'textarea'">
        <label>{{ field.label }}</label>
        <div class="value">
          <ng-container *ngIf="field.type !== 'textarea'; else textareaVal">
            {{ getFieldValue(field.name) }}
          </ng-container>
          <ng-template #textareaVal>
            <p class="description-text">{{ getFieldValue(field.name) }}</p>
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" *ngIf="showDeleteModal" (click)="cancelDelete()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z" fill="currentColor"/>
        </svg>
      </div>
      <h3>Delete {{ entity | titlecase }}?</h3>
      <p>This action cannot be undone. Are you sure?</p>
      <div class="modal-actions">
        <button class="btn-cancel" (click)="cancelDelete()">Cancel</button>
        <button class="btn-delete" (click)="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>
