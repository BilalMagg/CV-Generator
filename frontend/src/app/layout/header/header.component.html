<header class="app-header">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <span class="breadcrumb-root">CV Generator</span>
    <svg viewBox="0 0 24 24" fill="none" width="11" height="11" class="breadcrumb-sep">
      <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="breadcrumb-page">{{ pageName }}</span>
  </div>

  <div class="spacer"></div>

  <!-- Help -->
  <button class="header-btn">
    <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
      <path d="M6 9a3 3 0 1 1 3-3v12a3 3 0 1 1-3-3h12a3 3 0 1 1-3 3V6a3 3 0 1 1 3 3z"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Help</span>
  </button>

  <!-- Notification bell -->
  <button class="header-btn notif-btn">
    <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10 21a2 2 0 0 0 4 0"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="notif-dot"></span>
  </button>

  <div class="v-sep"></div>

  <!-- Signed-in status -->
  <div class="status-row">
    <span class="status-dot"></span>
    <span class="status-text">{{ userFullName() }}</span>
  </div>

</header>
