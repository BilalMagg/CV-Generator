<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M21 3L4.5 13.5M21 3V10M21 3H14" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 21L19.5 10.5M3 21V14M3 21H10" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-name">CV Generator</span>
  </div>

  <div class="sep"></div>

  <div class="project-switcher">
    <span class="project-dot"></span>
    My CVs
    <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
      <path d="M6 9l6 6 6-6" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="header-right">
    <span class="user-name">{{ userFullName() }}</span>
    <button class="icon-btn" title="Logout" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="avatar">{{ initials() }}</div>
  </div>
</header>
