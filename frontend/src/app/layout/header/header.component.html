<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M21 3L4.5 13.5M21 3V10M21 3H14" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 21L19.5 10.5M3 21V14M3 21H10" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-name">MyProject</span>
  </div>

  <div class="sep"></div>

  <div class="project-switcher">
    <span class="project-dot"></span>
    Production
    <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
      <path d="M6 9l6 6 6-6" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="header-right">
    <button class="icon-btn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="icon-btn" title="Docs">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-7v-4m0-2V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="avatar">{{ user.initials }}</div>
  </div>
</header>
