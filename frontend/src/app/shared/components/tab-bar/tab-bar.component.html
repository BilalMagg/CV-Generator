<nav class="tab-bar">
  @for (tab of tabs(); track tab.route) {
    <a
      class="tab"
      [routerLink]="baseRoute() + '/' + tab.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      <i class="ti ti-{{ tab.icon }}" aria-hidden="true"></i>
      <span>{{ tab.label }}</span>
    </a>
  }
</nav>
