name: cv

services:

  # ---------- Keycloak ----------
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: cv-keycloak

    command: start-dev

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/cv_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres

    ports:
      - "8080:8080"

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - cv-network

  # ---------- PostgreSQL ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cv-postgres
    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cv_db

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - cv-network

  # ---------- Backend (.NET) ----------
  backend:
    build:
      context: ./backend
    container_name: cv-backend

    ports:
      - "5000:80" 

    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80

    restart: unless-stopped

    depends_on:
      - postgres

    networks:
      - cv-network

  # ---------- AI Agents (FastAPI) ----------
  ai_agents:
    build:
      context: ./ai_agents  
    container_name: cv-ai-agents

    ports:
      - "8000:8000"

    restart: unless-stopped

    env_file:
      - ./ai_agents/.env

    depends_on:
      - backend

    networks:
      - cv-network

  # ---------- Frontend (Angular + Nginx) ----------
  frontend:
    build:
      context: ./frontend
    container_name: cv-frontend

    ports:
      - "4200:80"

    depends_on:
      - backend
      - ai_agents

    restart: unless-stopped

    networks:
      - cv-network

# ---------- Volumes ----------
volumes:
  pgdata:

# ---------- Networks ----------
networks:
  cv-network:
    driver: bridge