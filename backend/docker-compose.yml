services:
  postgres:
    image: pgvector/pgvector:pg16

    container_name: cv-postgres

    restart: always

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cv_db

    volumes:
      - pgdata:/var/lib/postgresql/data
      # - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
  
  backend:
    build:
      context: .   # path to your ASP.NET project with Dockerfile
    container_name: cv-backend
    # restart: always
    ports:
      - "5000:80"   # map container port 80 to host 5000
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://0.0.0.0:80"
      # DB connection variables for your ASP.NET app
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=cv_db;Username=postgres;Password=postgres"
    depends_on:
      - postgres

volumes:
  pgdata: