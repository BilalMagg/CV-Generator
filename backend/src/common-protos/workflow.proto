syntax = "proto3";

option csharp_namespace = "CommonProtos.Workflow";

message WorkflowProto {
    string id = 1;
    string name = 2;
    string description = 3;
    string definition_json = 4;
    bool is_active = 5;
    string created_at = 6;
}

message GetWorkflowByIdRequest { string id = 1; }
message GetAllWorkflowsRequest {}
message CreateWorkflowRequest {
    string name = 1;
    string description = 2;
    string definition_json = 3;
}
message UpdateWorkflowRequest {
    string id = 1;
    string name = 2;
    string description = 3;
    string definition_json = 4;
    bool is_active = 5;
}
message DeleteWorkflowRequest { string id = 1; }
message DeleteWorkflowResponse { bool success = 1; }

service WorkflowServiceGrpc {
    rpc GetWorkflowById(GetWorkflowByIdRequest) returns (WorkflowProto);
    rpc GetAllWorkflows(GetAllWorkflowsRequest) returns (stream WorkflowProto);
    rpc CreateWorkflow(CreateWorkflowRequest) returns (WorkflowProto);
    rpc UpdateWorkflow(UpdateWorkflowRequest) returns (WorkflowProto);
    rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
}