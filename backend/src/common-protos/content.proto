syntax = "proto3";

option csharp_namespace = "CommonProtos.Content";

message ProjectProto {
    string id = 1;
    string title = 2;
    string description = 3;
    string role = 4;
    string achievements = 5;
    string start_date = 6;
    string end_date = 7;
    string repository_url = 8;
    string demo_url = 9;
    string status = 10;
    string user_id = 11;
    string skills_json = 12;
    string ai_summary_json = 13;
    repeated float description_embedding = 14;
}

message SkillProto {
    string id = 1;
    string name = 2;
    string level = 3;
    int32 years_of_experience = 4;
    string user_id = 5;
    string category = 6;
    repeated float name_embedding = 7;
}

message ExperienceProto {
    string id = 1;
    string title = 2;
    string company = 3;
    string description = 4;
    string start_date = 5;
    string end_date = 6;
    string reference_url = 7;
    string status = 8;
    string user_id = 9;
    string ai_summary_json = 10;
    repeated float description_embedding = 11;
}

// Project
message GetProjectByIdRequest { string id = 1; }
message GetProjectsByUserIdRequest { string user_id = 1; }
message CreateProjectRequest {
    string title = 1;
    string description = 2;
    string role = 3;
    string achievements = 4;
    string start_date = 5;
    string end_date = 6;
    string repository_url = 7;
    string demo_url = 8;
    string status = 9;
    string user_id = 10;
    string skills_json = 11;
}
message UpdateProjectRequest {
    string id = 1;
    string title = 2;
    string description = 3;
    string role = 4;
    string achievements = 5;
    string start_date = 6;
    string end_date = 7;
    string repository_url = 8;
    string demo_url = 9;
    string status = 10;
    string skills_json = 11;
}
message DeleteProjectRequest { string id = 1; }
message DeleteProjectResponse { bool success = 1; }

// Skill
message GetSkillByIdRequest { string id = 1; }
message GetSkillsByUserIdRequest { string user_id = 1; }
message CreateSkillRequest {
    string name = 1;
    string level = 2;
    int32 years_of_experience = 3;
    string user_id = 4;
    string category = 5;
}
message UpdateSkillRequest {
    string id = 1;
    string name = 2;
    string level = 3;
    int32 years_of_experience = 4;
    string category = 5;
}
message DeleteSkillRequest { string id = 1; }
message DeleteSkillResponse { bool success = 1; }

// Experience
message GetExperienceByIdRequest { string id = 1; }
message GetExperiencesByUserIdRequest { string user_id = 1; }
message CreateExperienceRequest {
    string title = 1;
    string company = 2;
    string description = 3;
    string start_date = 4;
    string end_date = 5;
    string reference_url = 6;
    string status = 7;
    string user_id = 8;
}
message UpdateExperienceRequest {
    string id = 1;
    string title = 2;
    string company = 3;
    string description = 4;
    string start_date = 5;
    string end_date = 6;
    string reference_url = 7;
    string status = 8;
}
message DeleteExperienceRequest { string id = 1; }
message DeleteExperienceResponse { bool success = 1; }

service ContentServiceGrpc {
    // Projects
    rpc GetProjectById(GetProjectByIdRequest) returns (ProjectProto);
    rpc GetProjectsByUserId(GetProjectsByUserIdRequest) returns (stream ProjectProto);
    rpc CreateProject(CreateProjectRequest) returns (ProjectProto);
    rpc UpdateProject(UpdateProjectRequest) returns (ProjectProto);
    rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

    // Skills
    rpc GetSkillById(GetSkillByIdRequest) returns (SkillProto);
    rpc GetSkillsByUserId(GetSkillsByUserIdRequest) returns (stream SkillProto);
    rpc CreateSkill(CreateSkillRequest) returns (SkillProto);
    rpc UpdateSkill(UpdateSkillRequest) returns (SkillProto);
    rpc DeleteSkill(DeleteSkillRequest) returns (DeleteSkillResponse);

    // Experiences
    rpc GetExperienceById(GetExperienceByIdRequest) returns (ExperienceProto);
    rpc GetExperiencesByUserId(GetExperiencesByUserIdRequest) returns (stream ExperienceProto);
    rpc CreateExperience(CreateExperienceRequest) returns (ExperienceProto);
    rpc UpdateExperience(UpdateExperienceRequest) returns (ExperienceProto);
    rpc DeleteExperience(DeleteExperienceRequest) returns (DeleteExperienceResponse);
}