syntax = "proto3";

option csharp_namespace="CommonProtos.CV";

message CVProto{
  string id = 1; // generated cv id when it's stored on min io
  string title = 2;
  string template_id = 3;
  string user_id = 4;
  string created_at = 5;
  string modified_at = 6;
}

message GetCVByIdRequest{string id = 1;}

message GetCVsByUserIdRequest {string user_id = 1;}

message GetCVsByTemplateIdRequest {string id = 1;} // used in the analytics to get what templates are most used

message CreateCVRequest {
  string title = 1;
  string template_id = 2; 
  string user_id = 3;
  repeated string projects = 4;
  repeated string skills = 5;
  repeated string experiences = 6;
}  
message UpdateCVRequest{
  string id = 1;
  string title = 2;
  string template_id = 3; 
  string user_id = 4;
  repeated string projects = 5;
  repeated string skills = 6;
  repeated string experiences =7;
}

message DeleteCVRequest { string id = 1;}
message DeleteCVResponse {bool success = 1;}

service CVServiceGrpc{
  rpc GetCVById(GetCVByIdRequest) returns (CVProto);
  rpc GetCVsByUserId(GetCVsByUserIdRequest) returns (stream CVProto);
  rpc GetCVsByTemplateID(GetCVsByTemplateIdRequest) returns (stream CVProto);
  rpc CreateCV(CreateCVRequest) returns (CVProto);
  rpc UpdateCV(UpdateCVRequest) returns (CVProto);
  rpc DeleteCV(DeleteCVRequest) returns (DeleteCVResponse);
}