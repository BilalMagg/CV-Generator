syntax = "proto3";

option csharp_namespace = "CommonProtos.User";

message UserProto {
    string id = 1;
    string keycloak_id = 2;
    string first_name = 3;
    string last_name = 4;
    string email = 5;
    string phone_number = 6;
    string birth_date = 7;
    string role = 8;
    string avatar_url = 9;
    string created_at = 10;
    string last_login = 11;
    bool is_active = 12;
    string ai_profile_data_json = 13;
    string preferences_json = 14;
}

message GetUserByIdRequest { string id = 1; }
message GetUserByEmailRequest { string email = 1; }
message GetUserByKeycloakIdRequest { string keycloak_id = 1; }
message UserExistsRequest { string id = 1; }
message UserExistsResponse { bool exists = 1; }
message CreateUserRequest {
    string keycloak_id = 1;
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    string role = 5;
}
message UpdateUserRequest {
    string id = 1;
    string first_name = 2;
    string last_name = 3;
    string phone_number = 4;
    string avatar_url = 5;
    string preferences_json = 6;
}
message DeleteUserRequest { string id = 1; }
message DeleteUserResponse { bool success = 1; }

service UserServiceGrpc {
    rpc GetUserById(GetUserByIdRequest) returns (UserProto);
    rpc GetUserByEmail(GetUserByEmailRequest) returns (UserProto);
    rpc GetUserByKeycloakId(GetUserByKeycloakIdRequest) returns (UserProto);
    rpc UserExists(UserExistsRequest) returns (UserExistsResponse);
    rpc CreateUser(CreateUserRequest) returns (UserProto);
    rpc UpdateUser(UpdateUserRequest) returns (UserProto);
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}