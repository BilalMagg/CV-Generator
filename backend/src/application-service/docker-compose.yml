services:
  application-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: application-service
    ports:
      - "8085:8085"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=application-db;Port=5432;Database=application_db;Username=postgres;Password=postgres
      - JWT_AUTHORITY=http://keycloak:8080/realms/cv-realm # Placeholder if needed
    depends_on:
      application-db:
        condition: service_healthy

  application-db:
    image: pgvector/pgvector:pg16
    container_name: application-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=application_db
    ports:
      - "5435:5432" # Mapped to 5435 to avoid conflict with other postgres instances
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d application_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  application_db_data:
