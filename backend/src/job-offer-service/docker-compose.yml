services:
  job-offer-service:
    build: .
    container_name: cv-job-offer-service-standalone
    ports:
      - "8086:8086"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8086
      - ConnectionStrings__DefaultConnection=Host=job-offer-db;Port=5432;Database=job_offer_db;Username=postgres;Password=postgres
    depends_on:
      job-offer-db: { condition: service_healthy }
    networks:
      - cv-network

  job-offer-db:
    image: pgvector/pgvector:pg16
    container_name: cv-job-offer-db-standalone
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=job_offer_db
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_offer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cv-network

networks:
  cv-network:
    name: cv-network
    driver: bridge
