<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 32px; text-align: center; }
    .header h1 { margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .card { background: #f0f0ff; border-left: 4px solid #6366f1; padding: 16px; border-radius: 4px; margin: 16px 0; }
    .card .title { font-weight: bold; font-size: 18px; color: #4338ca; }
    .card .date { color: #666; margin-top: 8px; }
    .message { background: #fafafa; border-radius: 6px; padding: 16px; margin: 16px 0; font-style: italic; color: #555; }
    .btn { display: inline-block; margin-top: 16px; padding: 12px 28px;
           background: #6366f1; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
    .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⏰ Reminder</h1>
    </div>
    <div class="body">
      <p>Hi <strong>{{ first_name }}</strong>,</p>
      <p>This is your scheduled reminder:</p>
      <div class="card">
        <div class="title">{{ title }}</div>
        <div class="date">📅 Event Date: {{ event_date }}</div>
      </div>
      {{ if message != "" }}
      <div class="message">
        💬 Your note: {{ message }}
      </div>
      {{ end }}
      <p>Don't forget to prepare — good luck! 🍀</p>
      <a href="https://cvgenerator.com/applications/reminders" class="btn">View My Reminders</a>
    </div>
    <div class="footer">CV Generator — AI-Powered Career Platform</div>
  </div>
</body>
</html>
