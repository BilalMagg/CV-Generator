<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; overflow: hidden; }
    .header { background: #0f172a; color: white; padding: 32px; text-align: center; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .stats { display: flex; gap: 16px; margin: 24px 0; }
    .stat { flex: 1; background: #f1f5f9; border-radius: 8px; padding: 16px; text-align: center; }
    .stat .number { font-size: 32px; font-weight: bold; color: #2563eb; }
    .stat .label { font-size: 12px; color: #64748b; margin-top: 4px; }
    .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Your Weekly Summary 📊</h1>
    </div>
    <div class="body">
      <p>Hi <strong>{{ first_name }}</strong>, here's your activity this week:</p>
      <div class="stats">
        <div class="stat">
          <div class="number">{{ total_applications }}</div>
          <div class="label">Applications Sent</div>
        </div>
        <div class="stat">
          <div class="number">{{ responses }}</div>
          <div class="label">Responses Received</div>
        </div>
        <div class="stat">
          <div class="number">{{ cvs_generated }}</div>
          <div class="label">CVs Generated</div>
        </div>
      </div>
      <p>Keep it up! Consistency is key in the job search process.</p>
    </div>
    <div class="footer">CV Generator — AI-Powered Career Platform</div>
  </div>
</body>
</html>
