<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; overflow: hidden; }
    .header { background: #16a34a; color: white; padding: 32px; text-align: center; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 24px; padding: 12px 28px;
           background: #16a34a; color: white; text-decoration: none;
           border-radius: 6px; font-weight: bold; }
    .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Your CV is Ready! 📄</h1>
    </div>
    <div class="body">
      <p>Hi <strong>{{ first_name }}</strong>,</p>
      <p>Your AI-optimized CV has been successfully generated and is ready to download.</p>
      <a href="{{ download_url }}" class="btn">Download My CV</a>
      <p style="margin-top: 24px; color: #666; font-size: 14px;">
        Link expires in 24 hours. You can always regenerate from your dashboard.
      </p>
    </div>
    <div class="footer">CV Generator — AI-Powered Career Platform</div>
  </div>
</body>
</html>
