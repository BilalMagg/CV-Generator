<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; overflow: hidden; }
    .header { background: #7c3aed; color: white; padding: 32px; text-align: center; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .status { font-size: 20px; font-weight: bold; color: #7c3aed; }
    .btn { display: inline-block; margin-top: 24px; padding: 12px 28px;
           background: #7c3aed; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
    .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Application Update 🔔</h1>
    </div>
    <div class="body">
      <p>Hi <strong>{{ first_name }}</strong>,</p>
      <p>Your application for <strong>{{ position }}</strong> at <strong>{{ company }}</strong> has been updated.</p>
      <p>New status: <span class="status">{{ status }}</span></p>
      <a href="https://cvgenerator.com/applications" class="btn">View Details</a>
    </div>
    <div class="footer">CV Generator — AI-Powered Career Platform</div>
  </div>
</body>
</html>
