services:
  notification-service:
    build: .
    container_name: cv-notification-service-standalone
    ports:
      - "8087:8087"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8087
      - ConnectionStrings__DefaultConnection=Host=notification-db;Port=5432;Database=notification_db;Username=postgres;Password=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      notification-db: { condition: service_healthy }
    networks:
      - cv-network

  notification-db:
    image: pgvector/pgvector:pg16
    container_name: cv-notification-db-standalone
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=notification_db
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cv-network

networks:
  cv-network:
    name: cv-network
    driver: bridge
