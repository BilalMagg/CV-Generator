services:
  cv-service:
    build:
      context: ../../
      dockerfile: src/cv-service/Dockerfile
    container_name: cv-service
    ports:
      - "8088:8088"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8088
      - ConnectionStrings__DefaultConnection=Host=cv-db;Port=5432;Database=cv_db;Username=postgres;Password=postgres
      - JWT_AUTHORITY=http://keycloak:8080/realms/cv-realm
    depends_on:
      cv-db:
        condition: service_healthy

  cv-db:
    image: pgvector/pgvector:pg16
    container_name: cv-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cv_db
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cv_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cv_db_data:
