services:
  user-service:
    build:
      context: ../../
      dockerfile: src/user-service/Dockerfile
    container_name: cv-user-service-standalone
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8082
      - ConnectionStrings__DefaultConnection=Host=user-db;Port=5432;Database=user_db;Username=postgres;Password=postgres
    depends_on:
      user-db: { condition: service_healthy }
    networks:
      - cv-network

  user-db:
    image: pgvector/pgvector:pg16
    container_name: cv-user-db-standalone
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=user_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cv-network

networks:
  cv-network:
    name: cv-network
    driver: bridge
