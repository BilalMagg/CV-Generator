services:
  workflow-service:
    build:
      context: ../../
      dockerfile: src/workflow-service/Dockerfile
    container_name: cv-workflow-service-standalone
    ports:
      - "8084:8084"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8084
      - ConnectionStrings__DefaultConnection=Host=workflow-db;Port=5432;Database=workflow_db;Username=postgres;Password=postgres
    depends_on:
      workflow-db: { condition: service_healthy }
    networks:
      - cv-network

  workflow-db:
    image: pgvector/pgvector:pg16
    container_name: cv-workflow-db-standalone
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=workflow_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cv-network

networks:
  cv-network:
    name: cv-network
    driver: bridge
