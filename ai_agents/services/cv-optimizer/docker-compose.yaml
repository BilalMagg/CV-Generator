services:

  # ─── Votre agent ─────────────────────────────────────────
  cv-optimizer:
    build:
      context: ../..
      dockerfile: services/cv-optimizer/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://postgres:12345@db:5432/agent
      #                                          ↑
      #                              nom du service docker (pas localhost)
    env_file:
      - .env
    depends_on:
      - db

  # ─── Base de données ─────────────────────────────────────
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: